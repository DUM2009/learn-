<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O meu Perfil | Explore+</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">Explore+</div>
        <nav>
            <a href="index.html">Início</a>
            <a href="missions.html">Missões</a>
            <a href="about.html">Sobre</a>
        </nav>
    </header>

    <section class="dashboard">

        <div class="perfil-card">
            <div class="avatar">👤</div>
            <h2 id="nomeAluno">A carregar...</h2>
            <p id="emailAluno"></p>
        </div>

        <div class="xp-card">
            <h2>Nível 1</h2>
            <p>0 / 100 XP</p>
            <div class="barra">
                <div class="progresso"></div>
            </div>
        </div>

        <div class="conquistas-card">
            <h2>🏅 Conquistas</h2>
            <p>Ainda não tens conquistas.</p>
        </div>

        <div class="acoes-card">
            <h2>📚 Explorar</h2>
            <button onclick="window.location.href='missions.html'">Continuar a aprender</button>
            <button id="logoutBtn">Terminar sessão</button>
        </div>

    </section>

    <script type="module" src="perfil.js"></script>

</body>

</html>
