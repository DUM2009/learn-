      <rect x="110" y="-160" width="120" height="165" rx="32" fill="#2a2a2a" transform="rotate(25 170 -80)"/>
      <rect x="60" y="-40" width="280" height="36" rx="8" fill="#1d1d1d"/>
      <rect x="115" y="-15" width="25" height="140" rx="8" fill="#4e4a45"/>
      <rect x="155" y="-30" width="26" height="170" rx="10" fill="#4e4a45"/>
      <circle cx="302" cy="-25" r="38" fill="#2a2a2a"/>
