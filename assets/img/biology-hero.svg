      <path d="M0 40 C70 35 120 70 165 120 C100 130 55 110 0 80Z" fill="url(#leaf)"/>
      <path d="M0 160 C-90 165 -160 220 -205 280 C-130 290 -80 265 0 225Z" fill="url(#leaf)"/>
      <path d="M0 160 C90 165 160 220 205 280 C130 290 80 265 0 225Z" fill="url(#leaf)"/>
      <path d="M0 245 C-70 245 -125 280 -165 330 C-105 345 -55 330 0 300Z" fill="url(#leaf)"/>
      <path d="M0 245 C70 245 125 280 165 330 C105 345 55 330 0 300Z" fill="url(#leaf)"/>
      <rect x="-8" y="0" width="16" height="365" rx="8" fill="#255f17"/>
