<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">Ilustração científica verde</title>
  <desc id="desc">Planta, microscópio, frasco e elementos de biologia em tons verdes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2d4"/>
      <stop offset="100%" stop-color="#dfe8c6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9be33d"/>
      <stop offset="100%" stop-color="#2f7d1c"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#cfe8d0" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="microscope" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f3ec"/>
      <stop offset="100%" stop-color="#cfc7bb"/>
    </linearGradient>
  </defs>
  <rect width="1536" height="1024" fill="url(#bg)"/>
  <circle cx="770" cy="270" r="420" fill="url(#glow)"/>
  <g opacity="0.95">
    <ellipse cx="730" cy="560" rx="250" ry="330" fill="#c6d6a9" opacity="0.25"/>
    <g transform="translate(710 180)">
